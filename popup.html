<!DOCTYPE html>
<html>
<head>
  <title>Scroll Companion</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img id="plant-img" src="assets/plant1.png" alt="plant">
    <h1>Scroll Companion</h1>
  </div>

  <div id="mode-card">
    <div id="mode-label">No goal set today</div>
    <div id="mode-status"></div>
  </div>

  <div id="no-goal-hint">Visit Instagram to choose today's goal!</div>

  <div class="switch-section">
    <div class="switch-label">Switch goal:</div>
    <div class="switch-grid">
      <button class="switch-btn" data-mode="education">📚 Education</button>
      <button class="switch-btn" data-mode="health">🏃 Health</button>
      <button class="switch-btn" data-mode="productivity">⏱ Productivity</button>
      <button class="switch-btn" data-mode="reduce">📉 Reduce Usage</button>
      <button class="switch-btn" data-mode="mindfulness">🧘 Mindfulness</button>
    </div>
    <div id="switch-status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
